<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace">
  <defs>
    <marker id="sm-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#58A6FF"/></marker>
    <marker id="sm-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3FB950"/></marker>
    <marker id="sm-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#F85149"/></marker>
  </defs>
  <rect width="1100" height="600" fill="#0D1117"/>
  <text x="550" y="35" fill="#FFFFFF" font-size="20" text-anchor="middle" font-weight="bold">VT100/xterm Escape Code Parser — State Machine</text>
  <text x="550" y="55" fill="#8B949E" font-size="12" text-anchor="middle">Based on Paul Williams' DEC ANSI parser model (ECMA-48)</text>

  <!-- State: Ground (main) -->
  <rect x="80" y="200" width="160" height="80" rx="40" fill="#21262D" stroke="#3FB950" stroke-width="3"/>
  <text x="160" y="235" fill="#3FB950" font-size="16" text-anchor="middle" font-weight="bold">Ground</text>
  <text x="160" y="255" fill="#8B949E" font-size="10" text-anchor="middle">Print characters</text>
  <circle cx="80" cy="210" r="4" fill="#3FB950"/>
  <text x="55" y="205" fill="#3FB950" font-size="10">START</text>

  <!-- State: Escape -->
  <rect x="340" y="120" width="160" height="80" rx="12" fill="#21262D" stroke="#58A6FF" stroke-width="2.5"/>
  <text x="420" y="155" fill="#58A6FF" font-size="16" text-anchor="middle" font-weight="bold">Escape</text>
  <text x="420" y="175" fill="#8B949E" font-size="10" text-anchor="middle">ESC received</text>

  <!-- State: CSI Entry -->
  <rect x="600" y="120" width="160" height="80" rx="12" fill="#21262D" stroke="#58A6FF" stroke-width="2"/>
  <text x="680" y="155" fill="#58A6FF" font-size="14" text-anchor="middle" font-weight="bold">CSI Entry</text>
  <text x="680" y="175" fill="#8B949E" font-size="10" text-anchor="middle">ESC [ received</text>

  <!-- State: CSI Param -->
  <rect x="600" y="280" width="160" height="80" rx="12" fill="#21262D" stroke="#BC8CFF" stroke-width="2"/>
  <text x="680" y="315" fill="#BC8CFF" font-size="14" text-anchor="middle" font-weight="bold">CSI Param</text>
  <text x="680" y="335" fill="#8B949E" font-size="10" text-anchor="middle">Collecting 0-9 ; :</text>

  <!-- State: CSI Intermediate -->
  <rect x="600" y="430" width="160" height="80" rx="12" fill="#21262D" stroke="#BC8CFF" stroke-width="2"/>
  <text x="680" y="460" fill="#BC8CFF" font-size="13" text-anchor="middle" font-weight="bold">CSI Intermed</text>
  <text x="680" y="480" fill="#8B949E" font-size="10" text-anchor="middle">Collecting 0x20-2F</text>

  <!-- State: Execute/Dispatch -->
  <rect x="900" y="280" width="160" height="80" rx="12" fill="#21262D" stroke="#3FB950" stroke-width="2.5"/>
  <text x="980" y="310" fill="#3FB950" font-size="15" text-anchor="middle" font-weight="bold">Execute</text>
  <text x="980" y="330" fill="#8B949E" font-size="10" text-anchor="middle">CSI Dispatch</text>
  <text x="980" y="345" fill="#8B949E" font-size="9" text-anchor="middle">(apply action)</text>

  <!-- State: OSC String -->
  <rect x="340" y="280" width="160" height="80" rx="12" fill="#21262D" stroke="#D29922" stroke-width="2"/>
  <text x="420" y="315" fill="#D29922" font-size="14" text-anchor="middle" font-weight="bold">OSC String</text>
  <text x="420" y="335" fill="#8B949E" font-size="10" text-anchor="middle">Collecting chars</text>

  <!-- State: DCS Entry -->
  <rect x="340" y="430" width="160" height="80" rx="12" fill="#21262D" stroke="#D29922" stroke-width="2"/>
  <text x="420" y="465" fill="#D29922" font-size="14" text-anchor="middle" font-weight="bold">DCS Entry</text>
  <text x="420" y="485" fill="#8B949E" font-size="10" text-anchor="middle">Device Control</text>

  <!-- Transitions -->
  <!-- Ground → Escape (ESC 0x1B) -->
  <path d="M240 220 Q290 120 340 155" fill="none" stroke="#58A6FF" stroke-width="2" marker-end="url(#sm-arrow)"/>
  <text x="265" y="145" fill="#58A6FF" font-size="11" font-weight="bold">ESC (0x1B)</text>

  <!-- Escape → CSI Entry ([ 0x5B) -->
  <line x1="500" y1="155" x2="600" y2="155" stroke="#58A6FF" stroke-width="2" marker-end="url(#sm-arrow)"/>
  <text x="548" y="147" fill="#58A6FF" font-size="11" text-anchor="middle">[ (0x5B)</text>

  <!-- CSI Entry → CSI Param (0-9) -->
  <line x1="680" y1="200" x2="680" y2="280" stroke="#BC8CFF" stroke-width="2" marker-end="url(#sm-arrow)"/>
  <text x="695" y="245" fill="#BC8CFF" font-size="10">0-9 ; :</text>

  <!-- CSI Param → self loop -->
  <path d="M760 300 Q800 270 760 310" fill="none" stroke="#BC8CFF" stroke-width="1.5"/>
  <text x="805" y="292" fill="#BC8CFF" font-size="9">0-9</text>

  <!-- CSI Param → Execute (letter) -->
  <line x1="760" y1="320" x2="900" y2="320" stroke="#3FB950" stroke-width="2" marker-end="url(#sm-green)"/>
  <text x="830" y="312" fill="#3FB950" font-size="11" text-anchor="middle" font-weight="bold">A-Z a-z</text>
  <text x="830" y="328" fill="#8B949E" font-size="9" text-anchor="middle">(final byte)</text>

  <!-- CSI Param → CSI Intermediate -->
  <line x1="680" y1="360" x2="680" y2="430" stroke="#BC8CFF" stroke-width="1.5" marker-end="url(#sm-arrow)"/>
  <text x="700" y="400" fill="#BC8CFF" font-size="9">0x20-2F</text>

  <!-- CSI Intermediate → Execute -->
  <path d="M760 470 Q840 470 900 340" fill="none" stroke="#3FB950" stroke-width="1.5" marker-end="url(#sm-green)"/>

  <!-- Escape → OSC (]) -->
  <line x1="420" y1="200" x2="420" y2="280" stroke="#D29922" stroke-width="2" marker-end="url(#sm-arrow)"/>
  <text x="440" y="245" fill="#D29922" font-size="11">] (0x5D)</text>

  <!-- Escape → DCS (P) -->
  <path d="M400 200 Q380 350 400 430" fill="none" stroke="#D29922" stroke-width="1.5" marker-end="url(#sm-arrow)"/>
  <text x="360" y="370" fill="#D29922" font-size="10">P (0x50)</text>

  <!-- Execute → Ground -->
  <path d="M980 360 Q980 550 200 280" fill="none" stroke="#3FB950" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#sm-green)"/>
  <text x="600" y="560" fill="#3FB950" font-size="10" text-anchor="middle">Return to Ground (action complete)</text>

  <!-- OSC → Ground (ST) -->
  <path d="M340 320 Q200 320 200 270" fill="none" stroke="#F85149" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#sm-red)"/>
  <text x="240" y="310" fill="#F85149" font-size="9">ST / BEL</text>

  <!-- Examples box -->
  <rect x="30" y="400" width="260" height="170" rx="8" fill="#21262D" stroke="#30363D" stroke-width="1"/>
  <text x="50" y="425" fill="#E6EDF3" font-size="12" font-weight="bold">Common Sequences:</text>
  <text x="50" y="448" fill="#3FB950" font-size="10">ESC[31m</text><text x="140" y="448" fill="#8B949E" font-size="10">Red foreground</text>
  <text x="50" y="466" fill="#3FB950" font-size="10">ESC[1;1H</text><text x="140" y="466" fill="#8B949E" font-size="10">Cursor to (1,1)</text>
  <text x="50" y="484" fill="#3FB950" font-size="10">ESC[2J</text><text x="140" y="484" fill="#8B949E" font-size="10">Clear screen</text>
  <text x="50" y="502" fill="#D29922" font-size="10">ESC]0;title ST</text><text x="170" y="502" fill="#8B949E" font-size="10">Set title</text>
  <text x="50" y="520" fill="#D29922" font-size="10">ESC]52;c;... ST</text><text x="170" y="520" fill="#8B949E" font-size="10">Clipboard</text>
  <text x="50" y="538" fill="#58A6FF" font-size="10">ESC[38;2;R;G;Bm</text><text x="195" y="538" fill="#8B949E" font-size="10">24-bit color</text>
  <text x="50" y="556" fill="#58A6FF" font-size="10">ESC[?1049h</text><text x="155" y="556" fill="#8B949E" font-size="10">Alt screen on</text>

  <text x="550" y="590" fill="#8B949E" font-size="10" text-anchor="middle">Building Terminal Emulators: From Teletype to GPU (2026)</text>
</svg>