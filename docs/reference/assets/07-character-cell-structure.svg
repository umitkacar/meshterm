<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace">
  <rect width="800" height="500" fill="#0D1117"/>
  <text x="400" y="35" fill="#FFFFFF" font-size="20" text-anchor="middle" font-weight="bold">Character Cell Structure — The Terminal Grid</text>
  <text x="400" y="55" fill="#8B949E" font-size="12" text-anchor="middle">Each cell in the terminal grid stores a character and its visual attributes</text>

  <!-- Single Cell Detail (zoomed) -->
  <rect x="50" y="80" width="350" height="330" rx="12" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="225" y="105" fill="#58A6FF" font-size="14" text-anchor="middle" font-weight="bold">Single Cell (Struct)</text>

  <!-- Fields -->
  <rect x="75" y="120" width="300" height="30" rx="4" fill="#21262D" stroke="#3FB950" stroke-width="1.5"/>
  <text x="90" y="140" fill="#3FB950" font-size="11" font-weight="bold">character</text>
  <text x="270" y="140" fill="#8B949E" font-size="11" text-anchor="middle">u32 (Unicode codepoint)</text>
  <text x="360" y="140" fill="#D29922" font-size="11">'A'</text>

  <rect x="75" y="158" width="300" height="30" rx="4" fill="#21262D" stroke="#58A6FF" stroke-width="1"/>
  <text x="90" y="178" fill="#58A6FF" font-size="11" font-weight="bold">fg_color</text>
  <text x="250" y="178" fill="#8B949E" font-size="11" text-anchor="middle">RGB (r, g, b)</text>
  <rect x="340" y="163" width="20" height="20" rx="3" fill="#F85149"/>

  <rect x="75" y="196" width="300" height="30" rx="4" fill="#21262D" stroke="#58A6FF" stroke-width="1"/>
  <text x="90" y="216" fill="#58A6FF" font-size="11" font-weight="bold">bg_color</text>
  <text x="250" y="216" fill="#8B949E" font-size="11" text-anchor="middle">RGB (r, g, b)</text>
  <rect x="340" y="201" width="20" height="20" rx="3" fill="#161B22" stroke="#30363D" stroke-width="1"/>

  <rect x="75" y="234" width="145" height="30" rx="4" fill="#21262D" stroke="#BC8CFF" stroke-width="1"/>
  <text x="90" y="254" fill="#BC8CFF" font-size="11" font-weight="bold">bold</text>
  <text x="180" y="254" fill="#3FB950" font-size="11">true</text>

  <rect x="230" y="234" width="145" height="30" rx="4" fill="#21262D" stroke="#BC8CFF" stroke-width="1"/>
  <text x="245" y="254" fill="#BC8CFF" font-size="11" font-weight="bold">italic</text>
  <text x="340" y="254" fill="#F85149" font-size="11">false</text>

  <rect x="75" y="272" width="145" height="30" rx="4" fill="#21262D" stroke="#BC8CFF" stroke-width="1"/>
  <text x="90" y="292" fill="#BC8CFF" font-size="11" font-weight="bold">underline</text>
  <text x="180" y="292" fill="#F85149" font-size="11">false</text>

  <rect x="230" y="272" width="145" height="30" rx="4" fill="#21262D" stroke="#BC8CFF" stroke-width="1"/>
  <text x="245" y="292" fill="#BC8CFF" font-size="11" font-weight="bold">strikethrough</text>
  <text x="355" y="292" fill="#F85149" font-size="11">false</text>

  <rect x="75" y="310" width="145" height="30" rx="4" fill="#21262D" stroke="#D29922" stroke-width="1"/>
  <text x="90" y="330" fill="#D29922" font-size="11" font-weight="bold">wide</text>
  <text x="180" y="330" fill="#F85149" font-size="11">false</text>

  <rect x="230" y="310" width="145" height="30" rx="4" fill="#21262D" stroke="#D29922" stroke-width="1"/>
  <text x="245" y="330" fill="#D29922" font-size="11" font-weight="bold">hyperlink</text>
  <text x="355" y="330" fill="#8B949E" font-size="11">None</text>

  <rect x="75" y="348" width="300" height="30" rx="4" fill="#21262D" stroke="#39D2C0" stroke-width="1"/>
  <text x="90" y="368" fill="#39D2C0" font-size="11" font-weight="bold">grapheme_extra</text>
  <text x="280" y="368" fill="#8B949E" font-size="11" text-anchor="middle">Vec of combining marks</text>

  <text x="225" y="400" fill="#8B949E" font-size="10" text-anchor="middle">Total: ~16-24 bytes per cell</text>

  <!-- Grid visualization -->
  <rect x="440" y="80" width="330" height="200" rx="12" fill="#161B22" stroke="#3FB950" stroke-width="2"/>
  <text x="605" y="105" fill="#3FB950" font-size="14" text-anchor="middle" font-weight="bold">Terminal Grid (80 x 24)</text>

  <!-- Mini grid -->
  <g transform="translate(465, 115)">
    <!-- Row 0 -->
    <rect width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="8" y="16" fill="#3FB950" font-size="11">$</text>
    <rect x="25" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="33" y="16" fill="#E6EDF3" font-size="11"> </text>
    <rect x="50" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="57" y="16" fill="#E6EDF3" font-size="11">l</text>
    <rect x="75" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="82" y="16" fill="#E6EDF3" font-size="11">s</text>
    <rect x="100" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="107" y="16" fill="#E6EDF3" font-size="11"> </text>
    <rect x="125" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="130" y="16" fill="#D29922" font-size="11">-l</text>
    <rect x="150" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <rect x="175" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <text x="220" y="16" fill="#30363D" font-size="11">...</text>
    <!-- Row 1 -->
    <rect y="22" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="3" y="38" fill="#58A6FF" font-size="10">d</text>
    <rect x="25" y="22" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="28" y="38" fill="#58A6FF" font-size="10">r</text>
    <rect x="50" y="22" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="53" y="38" fill="#58A6FF" font-size="10">w</text>
    <rect x="75" y="22" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="78" y="38" fill="#58A6FF" font-size="10">x</text>
    <rect x="100" y="22" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="103" y="38" fill="#58A6FF" font-size="10">r</text>
    <rect x="125" y="22" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="128" y="38" fill="#8B949E" font-size="10">-</text>
    <rect x="150" y="22" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="153" y="38" fill="#8B949E" font-size="10">x</text>
    <rect x="175" y="22" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <!-- Row 2 -->
    <rect y="44" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/><text x="3" y="60" fill="#F85149" font-size="10">e</text>
    <rect x="25" y="44" width="25" height="22" fill="#F8514930" stroke="#F85149" stroke-width="0.5"/><text x="28" y="60" fill="#F85149" font-size="10" font-weight="bold">r</text>
    <rect x="50" y="44" width="25" height="22" fill="#F8514930" stroke="#F85149" stroke-width="0.5"/><text x="53" y="60" fill="#F85149" font-size="10" font-weight="bold">r</text>
    <rect x="75" y="44" width="25" height="22" fill="#F8514930" stroke="#F85149" stroke-width="0.5"/><text x="78" y="60" fill="#F85149" font-size="10" font-weight="bold">o</text>
    <rect x="100" y="44" width="25" height="22" fill="#F8514930" stroke="#F85149" stroke-width="0.5"/><text x="103" y="60" fill="#F85149" font-size="10" font-weight="bold">r</text>
    <rect x="125" y="44" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <rect x="150" y="44" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <rect x="175" y="44" width="25" height="22" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
  </g>

  <text x="605" y="195" fill="#8B949E" font-size="10" text-anchor="middle">Each rectangle = one Cell struct</text>
  <text x="605" y="212" fill="#8B949E" font-size="10" text-anchor="middle">80 x 24 = 1,920 cells = ~46 KB</text>

  <!-- Wide char + emoji example -->
  <rect x="440" y="240" width="330" height="35" rx="6" fill="#21262D" stroke="#D29922" stroke-width="1"/>
  <text x="460" y="262" fill="#D29922" font-size="11" font-weight="bold">Wide char:</text>
  <text x="560" y="262" fill="#E6EDF3" font-size="14">&#x4F60;</text>
  <text x="585" y="262" fill="#8B949E" font-size="10">= 2 cells (wide=true + placeholder)</text>

  <!-- Scrollback buffer -->
  <rect x="440" y="300" width="330" height="110" rx="12" fill="#161B22" stroke="#BC8CFF" stroke-width="2"/>
  <text x="605" y="325" fill="#BC8CFF" font-size="14" text-anchor="middle" font-weight="bold">Scrollback Buffer</text>
  <text x="605" y="348" fill="#8B949E" font-size="11" text-anchor="middle">Ring buffer (circular) strategy:</text>
  <text x="605" y="368" fill="#8B949E" font-size="10" text-anchor="middle">10,000 lines x 80 cols = 800K cells</text>
  <text x="605" y="385" fill="#8B949E" font-size="10" text-anchor="middle">~19 MB at 24 bytes/cell</text>
  <text x="605" y="400" fill="#58A6FF" font-size="10" text-anchor="middle">Old lines overwritten when full</text>

  <!-- Memory layout -->
  <rect x="50" y="420" width="720" height="50" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="400" y="442" fill="#E6EDF3" font-size="12" text-anchor="middle" font-weight="bold">Memory Layout: [Scrollback Buffer (ring)] + [Visible Grid (80x24)] + [Alt Screen (80x24)]</text>
  <text x="400" y="458" fill="#8B949E" font-size="10" text-anchor="middle">Alternate screen: activated by vim, less, tmux (ESC[?1049h)</text>

  <text x="400" y="490" fill="#8B949E" font-size="10" text-anchor="middle">Building Terminal Emulators: From Teletype to GPU (2026)</text>
</svg>