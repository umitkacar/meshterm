<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace">
  <defs>
    <marker id="gp-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#39D2C0"/></marker>
  </defs>
  <rect width="1100" height="500" fill="#0D1117"/>
  <text x="550" y="35" fill="#FFFFFF" font-size="20" text-anchor="middle" font-weight="bold">GPU Rendering Pipeline — Font Atlas to Pixels</text>
  <text x="550" y="55" fill="#8B949E" font-size="12" text-anchor="middle">How Alacritty, Ghostty, and Rio draw terminal characters on screen</text>

  <!-- Stage 1: Font Loading -->
  <rect x="30" y="90" width="180" height="130" rx="10" fill="#161B22" stroke="#D29922" stroke-width="2"/>
  <text x="120" y="115" fill="#D29922" font-size="13" text-anchor="middle" font-weight="bold">1. Font Loading</text>
  <rect x="50" y="130" width="140" height="25" rx="4" fill="#21262D" stroke="#30363D" stroke-width="1"/>
  <text x="120" y="147" fill="#8B949E" font-size="10" text-anchor="middle">FreeType / CoreText</text>
  <rect x="50" y="165" width="140" height="25" rx="4" fill="#21262D" stroke="#30363D" stroke-width="1"/>
  <text x="120" y="182" fill="#8B949E" font-size="10" text-anchor="middle">HarfBuzz (shaping)</text>
  <text x="120" y="210" fill="#8B949E" font-size="9" text-anchor="middle">Rasterize glyphs → bitmaps</text>

  <line x1="210" y1="155" x2="250" y2="155" stroke="#39D2C0" stroke-width="2" marker-end="url(#gp-r)"/>

  <!-- Stage 2: Font Atlas -->
  <rect x="255" y="90" width="180" height="130" rx="10" fill="#161B22" stroke="#58A6FF" stroke-width="2"/>
  <text x="345" y="115" fill="#58A6FF" font-size="13" text-anchor="middle" font-weight="bold">2. Font Atlas</text>
  <!-- Mini grid representing atlas -->
  <g transform="translate(285, 125)">
    <rect width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="6" y="15" fill="#58A6FF" font-size="12">A</text>
    <rect x="20" width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="26" y="15" fill="#58A6FF" font-size="12">B</text>
    <rect x="40" width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="46" y="15" fill="#58A6FF" font-size="12">C</text>
    <rect x="60" width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="65" y="15" fill="#58A6FF" font-size="12">...</text>
    <rect y="20" width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="6" y="35" fill="#58A6FF" font-size="12">a</text>
    <rect x="20" y="20" width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="26" y="35" fill="#58A6FF" font-size="12">b</text>
    <rect x="40" y="20" width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="46" y="35" fill="#58A6FF" font-size="12">c</text>
    <rect x="60" y="20" width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="65" y="35" fill="#58A6FF" font-size="12">...</text>
    <rect y="40" width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="6" y="55" fill="#58A6FF" font-size="12">0</text>
    <rect x="20" y="40" width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="26" y="55" fill="#58A6FF" font-size="12">1</text>
    <rect x="40" y="40" width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="46" y="55" fill="#58A6FF" font-size="12">2</text>
    <rect x="60" y="40" width="20" height="20" fill="#21262D" stroke="#58A6FF" stroke-width="0.5"/><text x="65" y="55" fill="#58A6FF" font-size="12">...</text>
  </g>
  <text x="345" y="210" fill="#8B949E" font-size="9" text-anchor="middle">Single GPU texture, all glyphs</text>

  <line x1="435" y1="155" x2="475" y2="155" stroke="#39D2C0" stroke-width="2" marker-end="url(#gp-r)"/>

  <!-- Stage 3: Vertex Buffer -->
  <rect x="480" y="90" width="180" height="130" rx="10" fill="#161B22" stroke="#BC8CFF" stroke-width="2"/>
  <text x="570" y="115" fill="#BC8CFF" font-size="13" text-anchor="middle" font-weight="bold">3. Vertex Buffer</text>
  <text x="570" y="140" fill="#8B949E" font-size="10" text-anchor="middle">Per character:</text>
  <text x="570" y="158" fill="#BC8CFF" font-size="10" text-anchor="middle">(x, y, u, v, fg, bg)</text>
  <text x="570" y="176" fill="#8B949E" font-size="10" text-anchor="middle">80x24 = 1920 quads</text>
  <text x="570" y="194" fill="#8B949E" font-size="10" text-anchor="middle">= 11,520 vertices</text>
  <text x="570" y="210" fill="#8B949E" font-size="9" text-anchor="middle">Batched per frame</text>

  <line x1="660" y1="155" x2="700" y2="155" stroke="#39D2C0" stroke-width="2" marker-end="url(#gp-r)"/>

  <!-- Stage 4: GPU Shader -->
  <rect x="705" y="90" width="180" height="130" rx="10" fill="#161B22" stroke="#39D2C0" stroke-width="2.5"/>
  <text x="795" y="115" fill="#39D2C0" font-size="13" text-anchor="middle" font-weight="bold">4. GPU Shaders</text>
  <rect x="725" y="130" width="140" height="25" rx="4" fill="#21262D" stroke="#39D2C0" stroke-width="1"/>
  <text x="795" y="147" fill="#39D2C0" font-size="10" text-anchor="middle">Vertex Shader</text>
  <rect x="725" y="165" width="140" height="25" rx="4" fill="#21262D" stroke="#39D2C0" stroke-width="1"/>
  <text x="795" y="182" fill="#39D2C0" font-size="10" text-anchor="middle">Fragment Shader</text>
  <text x="795" y="210" fill="#8B949E" font-size="9" text-anchor="middle">Sample atlas, apply colors</text>

  <line x1="885" y1="155" x2="925" y2="155" stroke="#39D2C0" stroke-width="2" marker-end="url(#gp-r)"/>

  <!-- Stage 5: Framebuffer / Screen -->
  <rect x="930" y="90" width="140" height="130" rx="10" fill="#161B22" stroke="#3FB950" stroke-width="2.5"/>
  <text x="1000" y="115" fill="#3FB950" font-size="13" text-anchor="middle" font-weight="bold">5. Screen</text>
  <rect x="950" y="130" width="100" height="70" rx="6" fill="#000000" stroke="#3FB950" stroke-width="1.5"/>
  <text x="1000" y="150" fill="#3FB950" font-size="9" text-anchor="middle">$ ls -la</text>
  <text x="1000" y="163" fill="#58A6FF" font-size="9" text-anchor="middle">drwxr-xr-x</text>
  <text x="1000" y="176" fill="#D29922" font-size="9" text-anchor="middle">file.txt</text>
  <text x="1000" y="189" fill="#F85149" font-size="9" text-anchor="middle">error.log</text>
  <text x="1000" y="210" fill="#8B949E" font-size="9" text-anchor="middle">60+ FPS</text>

  <!-- GPU API comparison -->
  <rect x="30" y="260" width="1040" height="90" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
  <text x="550" y="285" fill="#E6EDF3" font-size="14" text-anchor="middle" font-weight="bold">GPU API Comparison by Platform</text>
  <!-- Headers -->
  <text x="150" y="310" fill="#8B949E" font-size="11" text-anchor="middle" font-weight="bold">API</text>
  <text x="350" y="310" fill="#8B949E" font-size="11" text-anchor="middle" font-weight="bold">macOS</text>
  <text x="550" y="310" fill="#8B949E" font-size="11" text-anchor="middle" font-weight="bold">Linux</text>
  <text x="750" y="310" fill="#8B949E" font-size="11" text-anchor="middle" font-weight="bold">Windows</text>
  <text x="950" y="310" fill="#8B949E" font-size="11" text-anchor="middle" font-weight="bold">Used By</text>
  <!-- OpenGL -->
  <text x="150" y="332" fill="#58A6FF" font-size="10" text-anchor="middle">OpenGL</text>
  <text x="350" y="332" fill="#3FB950" font-size="10" text-anchor="middle">Deprecated</text>
  <text x="550" y="332" fill="#3FB950" font-size="10" text-anchor="middle">Native</text>
  <text x="750" y="332" fill="#3FB950" font-size="10" text-anchor="middle">Via ANGLE</text>
  <text x="950" y="332" fill="#8B949E" font-size="10" text-anchor="middle">Alacritty, Kitty</text>
  <!-- Metal -->
  <text x="150" y="345" fill="#58A6FF" font-size="10" text-anchor="middle">Metal</text>
  <text x="350" y="345" fill="#3FB950" font-size="10" text-anchor="middle">Native</text>
  <text x="550" y="345" fill="#F85149" font-size="10" text-anchor="middle">N/A</text>
  <text x="750" y="345" fill="#F85149" font-size="10" text-anchor="middle">N/A</text>
  <text x="950" y="345" fill="#8B949E" font-size="10" text-anchor="middle">Ghostty, iTerm2</text>

  <!-- Damage tracking section -->
  <rect x="30" y="370" width="510" height="100" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="285" y="395" fill="#E6EDF3" font-size="13" text-anchor="middle" font-weight="bold">Optimization: Damage Tracking</text>
  <text x="285" y="418" fill="#8B949E" font-size="11" text-anchor="middle">Only re-render changed cells, not entire screen</text>
  <text x="285" y="438" fill="#58A6FF" font-size="11" text-anchor="middle">Typical: 5-10% of cells change per frame</text>
  <text x="285" y="458" fill="#8B949E" font-size="11" text-anchor="middle">Alacritty: DamageTracker | Ghostty: dirty region</text>

  <!-- Performance stats -->
  <rect x="560" y="370" width="510" height="100" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="815" y="395" fill="#E6EDF3" font-size="13" text-anchor="middle" font-weight="bold">Performance Benchmarks</text>
  <text x="660" y="418" fill="#3FB950" font-size="11">Ghostty:</text><text x="760" y="418" fill="#8B949E" font-size="11">407 FPS, 2ms latency</text>
  <text x="660" y="438" fill="#58A6FF" font-size="11">Alacritty:</text><text x="760" y="438" fill="#8B949E" font-size="11">300+ FPS, 3ms latency</text>
  <text x="660" y="458" fill="#BC8CFF" font-size="11">iTerm2:</text><text x="760" y="458" fill="#8B949E" font-size="11">60 FPS, 12ms latency</text>

  <text x="550" y="490" fill="#8B949E" font-size="10" text-anchor="middle">Building Terminal Emulators: From Teletype to GPU (2026)</text>
</svg>